<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Мой сайт о котиках</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      margin: 0;
      padding: 20px;
    }

    header {
      text-align: center;
      background-color: #ffe4e1;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
      color: #333;
    }

    .cats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .cat-card {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 200px;
      margin: 10px;
      padding: 10px;
      text-align: center;
      transition: transform 0.2s;
    }

    .cat-card:hover {
      transform: scale(1.05);
    }

    .cat-image {
      width: 100%;
      border-radius: 8px;
    }

    .cat-name {
      font-weight: bold;
      margin-top: 10px;
    }

    p {
      margin-top: 8px;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>Добро пожаловать в мир котиков "Мур Мяу"!</h1>
  </header>

  <section class="cats">
    <div class="cat-card">
      <img src="https://placekitten.com/200/200" alt="Котик 1" class="cat-image" />
      <div class="cat-name">Мурзик</div>
      <p>Очень милый котик, любит играть и спать.</p>
    </div>
    <div class="cat-card">
      <img src="https://placekitten.com/201/200" alt="Котик 2" class="cat-image" />
      <div class="cat-name">Барсик</div>
      <p>Любит гулять на улице и ловить мышей.</p>
    </div>
    <div class="cat-card">
      <img src="https://placekitten.com/200/201" alt="Котик 3" class="cat-image" />
      <div class="cat-name">Пушок</div>
      <p>Обожает мягкие одеяла и ласки.</p>
    </div>
  </section>
</body>
</html>
